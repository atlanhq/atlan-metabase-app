[project]
name = "atlan-metabase-app"
version = "1.0.0"
description = "Atlan Metabase App: Built using Atlan Application SDK"
authors = [{ name = "Atlan Apps Team", email = "apps@atlan.com" }]
requires-python = ">=3.11"
license = "Apache-2.0"
readme = "README.md"
dependencies = [
    "atlan-application-sdk[daft,iam-auth,pandas,tests,workflows]==3.12.0",
    "poethepoet>=0.38.0",
]

[dependency-groups]
dev = [
    "pre-commit>=3.8.0",
    "isort>=5.13.2",
    "watchdog>=6.0.0",
    "requests",
    "pyright>=1.1.403",
    "ruff>=0.12.7",
]
test = [
    "pytest>=8.3.3",
    "pytest-timeout>=2.2.0",
    "coverage>=7.6.1",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=6.2.1",
]

[tool.poe.tasks]
# Regenerate contract artifacts from contract/app.pkl into app/generated/.
generate = "bash -c 'cd contract && pkl eval -m generated app.pkl && mkdir -p ../app/generated && cp generated/*.json generated/_input.py ../app/generated/ && rm -rf generated'"

# Dapr + Temporal local-dev tasks required by `atlan app run`.
start-dapr = "dapr run --enable-api-logging --log-level debug --app-id app --app-port 3000 --scheduler-host-address '' --placement-host-address '' --max-body-size 1024Mi --dapr-http-port 3500 --dapr-grpc-port 50001 --resources-path components"
start-temporal = "temporal server start-dev --db-filename /tmp/temporal.db"
start-deps.shell = "poe start-dapr & poe start-temporal &"
stop-deps.shell = "lsof -ti:3000,3500,7233,50001 | xargs kill -9 2>/dev/null || true"

[tool.hatch.build.targets.sdist]
include = ["./**/*.py"]

[tool.hatch.build.targets.wheel]
include = ["./**/*.py"]
packages = [
    "app",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pyright]
venvPath = "."
venv = ".venv"
typeCheckingMode = "standard"
exclude = [
    ".github/**",
    "app/generated/**",
    # TODO(upgrade-v3): tests still assert against v2 PreflightCheckResult fields
    # (success/successMessage/failureMessage). Remove this exclude once tests are
    # ported to the v3 PreflightCheck shape (name/passed/message).
    "tests/**",
]
reportMissingTypeStubs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.coverage.run]
omit = [
    "tests/**",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "pass",
    "raise ImportError",
]
fail_under = 60

[tool.uv.sources]
