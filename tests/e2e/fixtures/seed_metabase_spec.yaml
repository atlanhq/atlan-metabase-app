# Declarative seed spec for the Metabase e2e Docker pipeline.
#
# Drives tests/e2e/seed_metabase.py. The shape here is the EXPECTED state of
# Metabase after seeding. Test assertions in tests/e2e/test_*.py reference
# the same names, so update both in lockstep.

collections:
  # Top-level (root parent).
  - name: "E2E Marketing"
    color: "#509EE3"
  - name: "E2E Finance"
    color: "#88BF4D"
  - name: "E2E Excluded"
    color: "#A989C5"
  # Nested under E2E Marketing.
  - name: "E2E Campaigns"
    parent: "E2E Marketing"
    color: "#EF8C8C"

questions:
  # Native SQL — drives sqlglot lineage (Process + ColumnProcess).
  - name: "Top Customers by Order Value"
    type: native
    collection: "E2E Finance"
    sql: |
      SELECT c.customer_name, SUM(o.order_total) AS total_value
      FROM analytics.customers c
      JOIN analytics.orders o ON o.customer_id = c.customer_id
      GROUP BY c.customer_name
      ORDER BY total_value DESC
      LIMIT 10

  - name: "Recent Orders"
    type: native
    collection: "E2E Finance"
    sql: |
      SELECT order_id, customer_id, order_total, placed_at
      FROM analytics.orders
      WHERE placed_at >= NOW() - INTERVAL '30 days'
      ORDER BY placed_at DESC

  - name: "Product Catalog"
    type: native
    collection: "E2E Marketing"
    sql: "SELECT product_id, product_name, category, unit_price FROM analytics.products"

  # MBQL (GUI question) — no native SQL, so no Process/ColumnProcess record;
  # still emitted as MetabaseQuestion.
  - name: "All Customers (MBQL)"
    type: mbql
    collection: "E2E Marketing"
    table: customers

  # Question inside an excluded collection — used by filter tests.
  - name: "Excluded Question"
    type: native
    collection: "E2E Excluded"
    sql: "SELECT 1"

dashboards:
  - name: "Customer Insights"
    collection: "E2E Marketing"
    cards:
      - "Top Customers by Order Value"
      - "All Customers (MBQL)"

  - name: "Sales Overview"
    collection: "E2E Finance"
    cards:
      - "Recent Orders"
      - "Top Customers by Order Value"  # cross-dashboard reuse

  # Empty dashboard — sanity check that cards_count == 0 works.
  - name: "Empty Dashboard"
    collection: "E2E Campaigns"
    cards: []
