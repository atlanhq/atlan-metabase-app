schema_type: dataframe
version: 0.22.1
columns:
  database_name:
    dtype: str
    nullable: false
    unique: true
    required: true
    checks:
      str_length:
        min_value: 1
        max_value: 128
  database_type:
    dtype: str
    nullable: false
    required: true
    checks:
      isin:
      - SQL Server
  database_version:
    dtype: str
    nullable: false
    required: true
  database_edition:
    dtype: str
    nullable: false
    required: true
  schema_count:
    dtype: int64
    nullable: false
    required: true
    checks:
      greater_than_or_equal_to: 0
checks:
  check_record_count_ge:
    value: 1
  check_record_count_le:
    value: 100
index: null
coerce: false
strict: false
title: Raw Database Pandera Schema
description: Raw database output for scenario 'empty_include'.
