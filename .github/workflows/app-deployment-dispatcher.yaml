# Name of the Workflow
name: App Deployment Builder Trigger Dispatcher
on:
  workflow_run:
    workflows:
      - "Publish App Docker Image"
    branches:
      - main
    types:
      - completed

permissions:
  contents: read
  actions: write

jobs:
  app-deployment-dispatcher:
    name: Dispatch
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ['atlanhq/atlan-apps-deployment']
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.ORG_PAT_GITHUB }}
          fetch-depth: 0

      # extract branch name
      - name: Get branch name
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        id: get_branch

      - run: echo "REPOSITORY_NAME=`echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}' | sed -e "s/:refs//"`" >> $GITHUB_ENV
        shell: bash

      - name: Get version tag
        run: echo "version=$(echo `git ls-remote https://github.com/atlanhq/${REPOSITORY_NAME}.git ${{ steps.get_branch.outputs.branch }} | awk '{ print $1}' | cut -c1-7`)abcd" >> $GITHUB_OUTPUT
        id: get_version

      - name: Lowercase branch name
        run: echo "lowercase_branch=$(echo '${{ steps.get_branch.outputs.branch }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
        id: get_lowercase_branch

      - name: Extract App Name
        id: extract_app_name
        run: |
          repo_name=$(basename $GITHUB_REPOSITORY)
          app_name=$(echo $repo_name | sed -E 's/^atlan-(.*)-app$/\1/')
          echo "app_name=${app_name}" >> $GITHUB_OUTPUT

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3.0.0
        with:
          token: ${{ secrets.ORG_PAT_GITHUB }}
          repository: ${{ matrix.repo }}
          event-type: dispatch_app_builder_workflow
          client-payload: |-
            {
                "app_name": "${{ steps.extract_app_name.outputs.app_name }}",
                "image_name": "atlanhq/${{ github.event.repository.name }}:${{ steps.get_branch.outputs.branch }}-${{ steps.get_version.outputs.version }}"
            }
