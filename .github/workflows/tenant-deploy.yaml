name: Deploy to Tenant

# TODO(validation-suite): REWRITE REQUIRED before this workflow can run.
# Templated from atlan-mssql-app. Outstanding gaps:
#   - `atlan.yaml` does not exist in this repo. The "Resolve config" step
#     reads ``name:`` from it; add a fallback or author atlan.yaml.
#   - `.github/scripts/ae-workflow.sh` was not copied from the reference —
#     the script is MSSQL-shaped (5-node DAG with lineage/qi). For Metabase
#     a slimmer extract+publish DAG is likely correct.
#   - ``credential_guid`` / ``connection_qn`` defaults still point at
#     hard-coded MSSQL GUIDs (these are tenant-side resources; user must
#     create Metabase equivalents on the target tenant first).
#
# Builds the Docker image from a branch, deploys it to a specific tenant
# (active immediately — no GM approval required when CLI tenant matches target),
# then finds and submits the package-workflow registered by atlan app deploy.
#
# Required secrets (set on the repo):
#   ATLAN_API_KEY     — API key for the target tenant (configures CLI + AE auth)
#   ORG_PAT_GITHUB    — Org PAT for GHCR login and CLI binary download
#   ATLAN_BASE_URL    — Default tenant base URL (e.g. https://markeznp29.atlan.com)
#
# credential_guid and connection_qn are baked into the workflow inputs as defaults.
# Queue names are auto-derived from atlan.yaml + deployment tier — no need to
# set them manually. Override `deployment` (default: production) to switch tiers.

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant hostname — leave blank to use secret TENANT"
        required: false
        type: string
      ref:
        description: "Branch, tag, or SHA to build (default: current branch)"
        required: false
        type: string
      credential_guid:
        description: "Metabase credential GUID"
        required: false
        type: string
        default: "782950db-9cf2-4371-a4dd-3db354b78a9c"
      connection_qn:
        description: "Connection qualified name — must be a pre-existing Atlas connection"
        required: false
        type: string
        default: "default/metabase/1776915749"
      connection_name:
        description: "Connection display name — leave blank to use secret CONNECTION_NAME"
        required: false
        type: string
      deployment:
        description: "Deployment tier used to derive queue names (e.g. production, staging, ci)"
        required: false
        type: string
        default: "production"
      cli_version:
        description: "Atlan CLI version"
        required: false
        type: string
        default: "v0.1.12"
      workflow_slug:
        description: "Existing AE workflow slug — if set, skips build/deploy/create-workflow and only triggers this slug"
        required: false
        type: string

concurrency:
  group: deploy-${{ inputs.workflow_slug || github.ref }}-${{ inputs.tenant || 'default' }}
  cancel-in-progress: false

jobs:
  deploy-and-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Two scenarios per dispatch:
    #   upgrade — re-publish to the existing connection (cache-driven; incremental
    #             ``entities_published`` count surfaces drift only).
    #   fresh   — auto-generate ``default/metabase/test-fresh-<run_id>`` with
    #             ``connection_creation_enabled: true`` so the publish stage
    #             creates the connection and emits every extracted entity.
    # ``max-parallel: 1`` forces upgrade to run first (it owns the build+deploy
    # step). The fresh scenario reuses the package upgrade installed and skips
    # build+deploy, so the second matrix leg is trigger-only and ~6× faster.
    # Skipped entirely when ``inputs.workflow_slug`` is set (trigger-only mode
    # operates on a pre-existing slug whose connection_qn is already baked in).
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        scenario: ${{ inputs.workflow_slug != '' && fromJSON('["upgrade"]') || fromJSON('["upgrade","fresh"]') }}
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.ORG_PAT_GITHUB }}

      # ── Resolve config from inputs + secrets + atlan.yaml ────────────────
      # Queue names are derived from the app name in atlan.yaml so callers
      # only need to set `deployment` (default: production). Sensitive values
      # (tenant, credential_guid, connection_qn) fall back to repo secrets
      # when the dispatch input is left blank.
      - name: Resolve config
        id: cfg
        env:
          INPUT_TENANT: ${{ inputs.tenant }}
          INPUT_CRED_GUID: ${{ inputs.credential_guid }}
          INPUT_CONN_QN: ${{ inputs.connection_qn }}
          INPUT_CONN_NAME: ${{ inputs.connection_name }}
          INPUT_WORKFLOW_SLUG: ${{ inputs.workflow_slug }}
          SECRET_ATLAN_BASE_URL: ${{ secrets.ATLAN_BASE_URL }}
          SECRET_CONN_NAME: ${{ secrets.CONNECTION_NAME }}
          SCENARIO: ${{ matrix.scenario }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          # App name from atlan.yaml → queue pattern: atlan-{app}-{deployment}.
          # TODO(validation-suite): atlan.yaml does not exist in this repo; fall
          # back to a hard-coded ``metabase`` until it does.
          if [ -f atlan.yaml ]; then
            APP_NAME=$(grep "^name:" atlan.yaml | awk '{print $2}' | tr -d '[:space:]')
          else
            APP_NAME="metabase"
          fi
          DEPLOYMENT="${{ inputs.deployment }}"

          # Strip protocol from ATLAN_BASE_URL (https://host → host) for URL construction
          TENANT="${INPUT_TENANT:-${SECRET_ATLAN_BASE_URL#*://}}"
          CRED_GUID="${INPUT_CRED_GUID}"

          # Scenario branching:
          #   upgrade — caller-supplied connection_qn (typically the long-lived
          #             test connection), connection_creation_enabled=false.
          #             Publish cache short-circuits unchanged entities so
          #             ``entities_published`` is just the drift since last run.
          #   fresh   — auto-generated ``default/metabase/test-fresh-<run_id>``
          #             with connection_creation_enabled=true. Atlas has never
          #             seen this connection, so the publish stage creates it
          #             and emits every extracted entity (full-publish baseline).
          if [ "${SCENARIO}" = "fresh" ]; then
            CONN_QN="default/metabase/test-fresh-${RUN_ID}"
            CONN_NAME="${INPUT_CONN_NAME:-${SECRET_CONN_NAME:-test_metabase}}-fresh-${RUN_ID}"
            CONN_CREATION="true"
          else
            CONN_QN="${INPUT_CONN_QN}"
            CONN_NAME="${INPUT_CONN_NAME:-${SECRET_CONN_NAME:-test_metabase}}"
            CONN_CREATION="false"
          fi

          # Trigger-only path (workflow_slug provided) skips deploy + create-workflow,
          # so credential_guid/connection_qn aren't consumed and don't need to be set.
          if [ -n "${INPUT_WORKFLOW_SLUG}" ]; then
            REQUIRED_VARS="TENANT"
          else
            REQUIRED_VARS="TENANT CRED_GUID CONN_QN"
          fi
          for VAR in ${REQUIRED_VARS}; do
            [ -n "${!VAR}" ] || { echo "::error::${VAR} is empty — set the dispatch input or the repo secret"; exit 1; }
          done

          echo "tenant=${TENANT}"                                            >> "$GITHUB_OUTPUT"
          echo "credential_guid=${CRED_GUID}"                               >> "$GITHUB_OUTPUT"
          echo "connection_qn=${CONN_QN}"                                   >> "$GITHUB_OUTPUT"
          echo "connection_name=${CONN_NAME}"                               >> "$GITHUB_OUTPUT"
          echo "connection_creation_enabled=${CONN_CREATION}"               >> "$GITHUB_OUTPUT"
          echo "metabase_queue=atlan-${APP_NAME}-${DEPLOYMENT}"               >> "$GITHUB_OUTPUT"
          echo "publish_queue=atlan-publish-${DEPLOYMENT}"                  >> "$GITHUB_OUTPUT"
          echo "qi_queue=atlan-query-intelligence-${DEPLOYMENT}"            >> "$GITHUB_OUTPUT"
          echo "lineage_queue=atlan-lineage-${DEPLOYMENT}"                  >> "$GITHUB_OUTPUT"

          echo "Resolved: tenant=${TENANT} app=${APP_NAME} deployment=${DEPLOYMENT}"
          echo "  connection_qn=${CONN_QN} (new=${CONN_CREATION})"
          echo "  metabase_queue=atlan-${APP_NAME}-${DEPLOYMENT}"
          echo "  publish_queue=atlan-publish-${DEPLOYMENT}"
          echo "  qi_queue=atlan-query-intelligence-${DEPLOYMENT}"
          echo "  lineage_queue=atlan-lineage-${DEPLOYMENT}"

      # ── Install Atlan CLI ─────────────────────────────────────────────────
      # Only used by ``atlan app deploy`` below — skip on the trigger-only path
      # and on the ``fresh`` matrix leg (upgrade has already deployed by then,
      # max-parallel: 1 guarantees the ordering).
      - name: Install Atlan CLI
        if: inputs.workflow_slug == '' && matrix.scenario == 'upgrade'
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
        run: |
          set -euo pipefail
          gh release download "${{ inputs.cli_version }}" \
            --repo atlanhq/atlan-cli-releases \
            --pattern "*Linux_amd64.tar.gz" \
            --output atlan-cli.tar.gz
          tar -xzf atlan-cli.tar.gz
          chmod +x atlan
          sudo mv atlan /usr/local/bin/atlan
          atlan --version

      # ── Configure CLI for target tenant ──────────────────────────────────
      # CLI tenant must match --tenants value for immediate (no-approval) deploy.
      - name: Configure Atlan CLI
        if: inputs.workflow_slug == '' && matrix.scenario == 'upgrade'
        env:
          ATLAN_API_KEY: ${{ secrets.ATLAN_API_KEY }}
        run: |
          atlan config atlan_base_url "https://${{ steps.cfg.outputs.tenant }}"
          atlan config atlan_api_key "$ATLAN_API_KEY"

      # ── Build image + deploy to tenant ────────────────────────────────────
      # atlan app deploy = build image → register in marketplace → install on tenant.
      # Because CLI is configured with the same tenant as the target,
      # the release activates immediately without GM approval.
      - name: Build and deploy to tenant
        if: inputs.workflow_slug == '' && matrix.scenario == 'upgrade'
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT_GITHUB }}
        run: |
          set -euo pipefail
          REF="${{ inputs.ref || github.ref_name }}"
          echo "Deploying branch '${REF}' to ${{ steps.cfg.outputs.tenant }}..."
          atlan app deploy --ref "${REF}"

      # ── Create / update AE workflow on tenant ────────────────────────────
      # The workflow name embeds the connection name and the GitHub run ID
      # so every deploy creates a fresh AE workflow (new slug). This avoids
      # the AE 409 "already active" conflict when re-deploying while a
      # previous run is still in flight, and keeps each deploy's DAG version
      # observable in the AE UI.
      # connection_creation_enabled is true only when connection_qn was
      # auto-generated (blank dispatch input = brand-new connection).
      - name: Create AE workflow
        id: create-workflow
        if: inputs.workflow_slug == ''
        env:
          ATLAN_API_KEY: ${{ secrets.ATLAN_API_KEY }}
        run: |
          set -euo pipefail
          bash .github/scripts/ae-workflow.sh \
            --ae-url        "https://${{ steps.cfg.outputs.tenant }}/automation" \
            --name          "Metabase Extract - ${{ steps.cfg.outputs.connection_name }} - ${{ matrix.scenario }} - ${{ github.run_id }}" \
            --cred-guid     "${{ steps.cfg.outputs.credential_guid }}" \
            --connection-qn "${{ steps.cfg.outputs.connection_qn }}" \
            --connection-name "${{ steps.cfg.outputs.connection_name }}" \
            --connection-creation-enabled "${{ steps.cfg.outputs.connection_creation_enabled }}" \
            --metabase-queue   "${{ steps.cfg.outputs.metabase_queue }}" \
            --publish-queue "${{ steps.cfg.outputs.publish_queue }}" \
            --qi-queue      "${{ steps.cfg.outputs.qi_queue }}" \
            --lineage-queue "${{ steps.cfg.outputs.lineage_queue }}" \
            > /tmp/ae-workflow-create.log 2>&1 || {
            echo "=== ae-workflow.sh output ==="
            cat /tmp/ae-workflow-create.log
            exit 1
          }
          cat /tmp/ae-workflow-create.log
          SLUG=$(tail -1 /tmp/ae-workflow-create.log)
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Workflow slug: ${SLUG}"

      # ── Submit run ────────────────────────────────────────────────────────
      # Cancels any in-flight runs for this slug first so re-dispatches don't
      # pile up queued runs behind a stuck one. Cancel is best-effort — if
      # the AE list/cancel endpoints return unexpected shapes we log and
      # move on, because a failed cancel shouldn't block the new submit.
      - name: Submit AE workflow run
        id: submit-run
        env:
          ATLAN_API_KEY: ${{ secrets.ATLAN_API_KEY }}
        run: |
          set -euo pipefail
          AE_URL="https://${{ steps.cfg.outputs.tenant }}/automation"
          SLUG="${{ inputs.workflow_slug || steps.create-workflow.outputs.slug }}"
          [ -n "${SLUG}" ] || { echo "::error::No AE workflow slug — provide workflow_slug or let create-workflow run"; exit 1; }

          # ── Cancel in-flight runs for this slug ──────────────────────
          # Cancel anything not in a terminal state. Whitelisting active
          # statuses lost coverage when AE introduced new in-flight states
          # (the previous filter missed a state that still triggered AE's
          # 409 "already active" check on submit). Inverting to a terminal
          # blocklist is forward-compatible.
          echo "Looking up in-flight runs for ${SLUG}..."
          LIST_RESP=$(curl -s "${AE_URL}/api/v1/workflows/${SLUG}/runs" \
            -H "Authorization: Bearer ${ATLAN_API_KEY}" 2>/dev/null || echo '{}')
          echo "$LIST_RESP" | python3 -c "
          import json, sys
          d = json.loads(sys.stdin.read() or '{}').get('data', [])
          if isinstance(d, list):
              for r in d[:10]:
                  print(f\"  run guid={r.get('guid','?')} status={r.get('status','?')}\")
          " 2>/dev/null || true
          RUNNING_GUIDS=$(echo "$LIST_RESP" | python3 -c "
          import json, sys
          TERMINAL = {
              'COMPLETED', 'SUCCESS', 'SUCCEEDED', 'FAILED', 'FAILURE',
              'CANCELLED', 'CANCELED', 'ERROR', 'ERRORED', 'TIMED_OUT',
              'TIMEOUT', 'TERMINATED', 'ABORTED', 'SKIPPED',
          }
          data = json.loads(sys.stdin.read() or '{}').get('data', [])
          if not isinstance(data, list):
              data = []
          for r in data:
              status = (r.get('status') or '').upper()
              if status and status not in TERMINAL:
                  g = r.get('guid')
                  if g:
                      print(g)
          " 2>/dev/null || true)

          if [ -n "${RUNNING_GUIDS}" ]; then
            for GUID in ${RUNNING_GUIDS}; do
              echo "Cancelling in-flight run ${GUID}..."
              # Try POST /cancel first, then DELETE as fallback.
              CANCEL_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "${AE_URL}/api/v1/runs/${GUID}/cancel" \
                -H "Authorization: Bearer ${ATLAN_API_KEY}" 2>/dev/null || echo "000")
              if [ "${CANCEL_CODE}" != "200" ] && [ "${CANCEL_CODE}" != "204" ]; then
                curl -s -X DELETE "${AE_URL}/api/v1/runs/${GUID}" \
                  -H "Authorization: Bearer ${ATLAN_API_KEY}" > /dev/null 2>&1 || true
                echo "  POST cancel returned ${CANCEL_CODE}; tried DELETE fallback."
              else
                echo "  Cancelled (HTTP ${CANCEL_CODE})."
              fi
            done
          else
            echo "No in-flight runs to cancel."
          fi

          # ── Submit new run ───────────────────────────────────────────
          RUN=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${AE_URL}/api/v1/workflows/${SLUG}/submit" \
            -H "Authorization: Bearer ${ATLAN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          HTTP_STATUS=$(echo "$RUN" | grep "HTTP_STATUS:" | cut -d: -f2)
          RUN_BODY=$(echo "$RUN" | sed '/HTTP_STATUS:/d')
          echo "Submit response (HTTP ${HTTP_STATUS}): ${RUN_BODY}"
          if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
            echo "::error::Submit failed with HTTP ${HTTP_STATUS}: ${RUN_BODY}"
            exit 1
          fi
          RUN_GUID=$(echo "$RUN_BODY" | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['guid'])")
          echo "run_guid=${RUN_GUID}" >> "$GITHUB_OUTPUT"
          echo "Run submitted: ${RUN_GUID}"

      # ── Poll extract + publish to completion ──────────────────────────────
      - name: Poll AE run to completion
        id: poll
        env:
          ATLAN_API_KEY: ${{ secrets.ATLAN_API_KEY }}
        run: |
          set -euo pipefail
          AE_URL="https://${{ steps.cfg.outputs.tenant }}/automation"
          RUN_GUID="${{ steps.submit-run.outputs.run_guid }}"

          # Write parser once; stage passed as argv[1], JSON response via stdin.
          cat > /tmp/parse_status.py << 'PYEOF'
          import json, sys
          stage = sys.argv[1]
          data = json.loads(sys.stdin.read() or '{}').get('data', {})
          stages = data.get('stages', data.get('steps', []))
          for s in stages:
              name = s.get('name', s.get('stage', ''))
              wf_id = s.get('workflow_id', '')
              if name == stage or wf_id.endswith('-' + stage):
                  print(s.get('status', 'RUNNING').upper())
                  sys.exit(0)
          print(data.get('status', 'RUNNING').upper())
          PYEOF

          wait_for_stage() {
            local STAGE="$1" MAX="${2:-900}"
            local ELAPSED=0
            echo "Waiting for ${STAGE} (${RUN_GUID}-${STAGE})..."
            while [ $ELAPSED -lt $MAX ]; do
              RESPONSE=$(curl -sf "${AE_URL}/api/v1/runs/${RUN_GUID}" \
                -H "Authorization: Bearer ${ATLAN_API_KEY}" 2>/dev/null || echo '{}')
              STATUS=$(echo "$RESPONSE" | python3 /tmp/parse_status.py "$STAGE" 2>/dev/null || echo "RUNNING")

              echo "  ${STAGE}: ${STATUS} (${ELAPSED}s)"
              case "$STATUS" in
                COMPLETED|SUCCEEDED) echo "${STAGE} done."; return 0 ;;
                FAILED)              echo "::error::${STAGE} FAILED"; return 1 ;;
                TERMINATED|CANCELED) echo "::error::${STAGE} ${STATUS}"; return 1 ;;
              esac
              sleep 15
              ELAPSED=$((ELAPSED + 15))
            done
            echo "::error::${STAGE} timed out after ${MAX}s"
            return 1
          }

          # 5-node DAG: extract → {qi, publish} → lineage-app → lineage-publish.
          # Wait sequentially in topological order. ``qi`` and ``publish``
          # depend on extract and run in parallel; either one finishing first
          # is fine — we just need both done before lineage-app picks up.
          wait_for_stage extract         900
          wait_for_stage qi              600
          wait_for_stage publish         600
          wait_for_stage lineage-app     600
          wait_for_stage lineage-publish 600

      # ── Summary ───────────────────────────────────────────────────────────
      # Pulls the AE run details (``/api/v1/runs/{run_guid}``) and renders
      # per-stage status + duration + record counts into
      # ``$GITHUB_STEP_SUMMARY``. Tolerates missing fields so a degraded
      # AE response still produces a useful skeleton.
      - name: Summary
        if: always()
        env:
          ATLAN_API_KEY: ${{ secrets.ATLAN_API_KEY }}
        run: |
          RUN_GUID="${{ steps.submit-run.outputs.run_guid }}"
          AE_URL="https://${{ steps.cfg.outputs.tenant }}/automation"

          # Fetch the AE run payload — empty JSON if the call fails so the
          # parser below produces placeholder rows instead of crashing.
          RUN_JSON='{}'
          if [ -n "${RUN_GUID}" ]; then
            RUN_JSON=$(curl -sf "${AE_URL}/api/v1/runs/${RUN_GUID}" \
              -H "Authorization: Bearer ${ATLAN_API_KEY}" 2>/dev/null || echo '{}')
          fi

          cat > /tmp/render_summary.py <<'PYEOF'
          import json, os, sys
          from datetime import datetime

          TENANT = os.environ.get('TENANT', '')
          RUN_GUID = os.environ.get('RUN_GUID', '')
          TEMPORAL_BASE = f"https://{TENANT}/api/temporal/namespaces/default/workflows"

          raw = sys.stdin.read() or '{}'
          try:
              parsed = json.loads(raw)
          except json.JSONDecodeError:
              parsed = {}
          data = parsed.get('data') or parsed or {}

          # AE's current shape: ``data.dag`` is a **dict** keyed by stage name
          # (not a list under ``stages``/``steps``). Build a list of
          # (name, stage-dict) tuples in the canonical pipeline order so the
          # Stages table reads top-to-bottom.
          _STAGE_ORDER = ('extract', 'qi', 'publish', 'lineage-app', 'lineage-publish')
          dag = data.get('dag') or {}
          if isinstance(dag, dict):
              ordered = [(n, dag[n]) for n in _STAGE_ORDER if n in dag]
              extras = [(n, v) for n, v in dag.items() if n not in _STAGE_ORDER]
              stages = ordered + extras
          else:
              stages = []

          def _ms_to_dt(v):
              # AE emits started_at / completed_at as unix milliseconds (int).
              if isinstance(v, (int, float)) and v > 0:
                  return datetime.fromtimestamp(v / 1000.0)
              if isinstance(v, str) and v:
                  try:
                      return datetime.fromisoformat(v.replace('Z', '+00:00'))
                  except ValueError:
                      return None
              return None

          def _duration(s):
              if not isinstance(s, dict):
                  return '—'
              a, b = _ms_to_dt(s.get('started_at')), _ms_to_dt(s.get('completed_at'))
              if not (a and b):
                  return '—'
              secs = (b - a).total_seconds()
              if secs < 60:
                  return f"{secs:.0f}s"
              return f"{int(secs // 60)}m{int(secs % 60):02d}s"

          def _status_emoji(s):
              return {
                  'COMPLETED': '✅', 'SUCCEEDED': '✅',
                  'FAILED': '❌', 'TERMINATED': '⛔', 'CANCELED': '⛔',
                  'RUNNING': '⏳', 'PENDING': '⏳', 'QUEUED': '⏳',
              }.get((s or '').upper(), (s or '—'))

          lines = []

          def _temporal_wf_id(name, stage_dict):
              # Per-stage Temporal workflow ids follow ``{run_guid}-{stage}``.
              # ``extract`` confirms this via its own outputs.workflow_id;
              # the other stages don't surface workflow_id, so we derive.
              outs = (stage_dict or {}).get('outputs') or {}
              return outs.get('workflow_id') or (
                  f"{RUN_GUID}-{name}" if RUN_GUID else ''
              )

          def _temporal_link(name, stage_dict):
              wf_id = _temporal_wf_id(name, stage_dict)
              if not (TENANT and wf_id):
                  return '—', ''
              # AE response doesn't expose per-stage Temporal run_id. Without
              # it the workflow-scoped URL still works — Temporal UI lands
              # on the latest run.
              url = f"{TEMPORAL_BASE}/{wf_id}"
              return f"[history]({url})", url

          # ── Per-stage status + Temporal workflow link per stage ──────────
          if stages:
              lines += [
                  '### Stages',
                  '',
                  '| Stage | Status | Duration | Temporal |',
                  '|-------|--------|---------:|:--------:|',
              ]
              failed_details = []
              for name, s in stages:
                  status = (s.get('status') or '').upper()
                  link, _ = _temporal_link(name, s)
                  lines.append(
                      f"| `{name}` | {_status_emoji(status)} {status or '—'} "
                      f"| {_duration(s)} | {link} |"
                  )
                  # Collect the failure-detail block AFTER the table so a
                  # reviewer's eye lands on the per-stage row first, then on
                  # the structured error block. Cap message at 4 KB so a
                  # rogue traceback doesn't blow out the Step Summary.
                  if status in ('FAILED', 'TERMINATED', 'CANCELED', 'TIMED_OUT', 'ERROR'):
                      err_msg = (s.get('error_message') or '').strip()
                      err_type = (s.get('error_type') or '').strip()
                      err_details = s.get('error_details')
                      if err_msg or err_type or err_details:
                          failed_details.append((name, status, err_type, err_msg, err_details))
              lines.append('')
              for name, status, err_type, err_msg, err_details in failed_details:
                  lines += [
                      f'#### `{name}` failure detail',
                      '',
                      f'- **Status:** `{status}`',
                  ]
                  if err_type:
                      lines.append(f'- **Type:** `{err_type}`')
                  if err_msg:
                      truncated = err_msg if len(err_msg) <= 4000 else err_msg[:4000] + '\n…[truncated]'
                      lines += ['- **Message:**', '', '```', truncated, '```']
                  if err_details and isinstance(err_details, (dict, list)):
                      try:
                          dump = json.dumps(err_details, indent=2, default=str)
                      except Exception:
                          dump = str(err_details)
                      if len(dump) > 4000:
                          dump = dump[:4000] + '\n…[truncated]'
                      lines += ['- **Details:**', '', '```json', dump, '```']
                  elif err_details:
                      lines += ['- **Details:**', '', '```', str(err_details)[:4000], '```']
                  lines.append('')

          # ── Record counts (from extract stage output) ─────────────────────
          extract_stage = dict(stages).get('extract') or {}
          outputs = extract_stage.get('outputs') or {}
          count_fields = [
              ('databases_extracted',  'Databases'),
              ('schemas_extracted',    'Schemas'),
              ('tables_extracted',     'Tables'),
              ('views_extracted',      'Views'),
              ('columns_extracted',    'Columns'),
              ('procedures_extracted', 'Procedures'),
              ('records_uploaded',     'Records uploaded'),
          ]
          rows = [
              (label, outputs.get(key))
              for key, label in count_fields
              if outputs.get(key) is not None
          ]
          if rows:
              lines += ['### Extract counts', '', '| Entity | Count |', '|--------|------:|']
              for label, count in rows:
                  lines.append(f"| {label} | {count:,} |")
              lines.append('')

          # ── Publish + lineage-publish metrics ────────────────────────────
          pub_rows = []
          for stage_name in ('publish', 'lineage-publish'):
              s = dict(stages).get(stage_name) or {}
              metrics = (s.get('outputs') or {}).get('metrics') or {}
              if not metrics:
                  continue
              for mkey, m in metrics.items():
                  if not isinstance(m, dict):
                      continue
                  pub_rows.append(
                      (stage_name, m.get('display_name', mkey), m.get('value', 0))
                  )
          if pub_rows:
              lines += [
                  '### Publish metrics', '',
                  '| Stage | Metric | Count |',
                  '|-------|--------|------:|',
              ]
              for st, lbl, ct in pub_rows:
                  try:
                      fmt = f"{int(ct):,}"
                  except (TypeError, ValueError):
                      fmt = str(ct)
                  lines.append(f"| `{st}` | {lbl} | {fmt} |")
              lines.append('')

          # ── Per-stage Temporal workflow links (explicit, for the Links
          #     section) ─────────────────────────────────────────────────────
          if stages and TENANT:
              link_rows = []
              for name, s in stages:
                  _, url = _temporal_link(name, s)
                  if url:
                      link_rows.append(f"  - **{name}:** [{url}]({url})")
              if link_rows:
                  lines += ['### Temporal workflows', '', *link_rows, '']

          # ── Debug drop-in when no stages were parsed ─────────────────────
          if not stages:
              preview = raw[:1500].replace('`', '\\`')
              lines += [
                  '<details><summary>Debug: AE response had no recognised stages</summary>',
                  '',
                  'Expected ``data.dag`` dict keyed by stage name. Raw (first 1500 chars):',
                  '',
                  '```json',
                  preview,
                  '```',
                  '',
                  '</details>',
                  '',
              ]

          sys.stdout.write('\n'.join(lines) + '\n')
          PYEOF

          RICH_SECTION=$(printf '%s' "$RUN_JSON" \
            | TENANT="${{ steps.cfg.outputs.tenant }}" RUN_GUID="${RUN_GUID}" \
              python3 /tmp/render_summary.py 2>/dev/null || echo '')

          {
            echo "## Deploy to Tenant — \`${{ steps.cfg.outputs.tenant }}\` — \`${{ matrix.scenario }}\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Scenario | \`${{ matrix.scenario }}\` |"
            echo "| Branch | \`${{ inputs.ref || github.ref_name }}\` |"
            echo "| Deployment | \`${{ inputs.deployment }}\` |"
            echo "| Credential | \`${{ steps.cfg.outputs.credential_guid }}\` |"
            echo "| Connection name | \`${{ steps.cfg.outputs.connection_name }}\` |"
            echo "| Connection QN | \`${{ steps.cfg.outputs.connection_qn }}\` |"
            echo "| New connection | \`${{ steps.cfg.outputs.connection_creation_enabled }}\` |"
            echo "| Run GUID | \`${RUN_GUID:-N/A}\` |"
            echo "| Deploy | ${{ steps.create-workflow.outcome }} |"
            echo "| AE Run | ${{ steps.poll.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo ""
            if [ -n "$RICH_SECTION" ]; then
              echo "$RICH_SECTION"
            fi
            SLUG="${{ inputs.workflow_slug || steps.create-workflow.outputs.slug }}"
            TEMPORAL_UI="https://${{ steps.cfg.outputs.tenant }}/api/temporal/namespaces/default/workflows"
            if [ -n "$RUN_GUID" ] || [ -n "$SLUG" ]; then
              echo "### Links"
              echo ""
              if [ -n "$SLUG" ]; then
                echo "- **Automation Engine workflow (executions):** [\`${SLUG}\`](https://${{ steps.cfg.outputs.tenant }}/automation/editor/?tab=executions&id=${SLUG})"
              fi
              if [ -n "$RUN_GUID" ]; then
                echo "- **Run GUID:** \`${RUN_GUID}\`"
              fi
              # When RICH_SECTION didn't include the per-stage Temporal
              # workflows subsection (AE response parser missed stages),
              # fall back to the tenant's Temporal namespace root so
              # reviewers can at least get there in one click.
              if ! printf '%s' "$RICH_SECTION" | grep -q '### Temporal workflows'; then
                echo "- **Temporal (tenant namespace):** [${TEMPORAL_UI}](${TEMPORAL_UI})"
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
