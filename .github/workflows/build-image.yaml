name: Build Image (for atlan app deploy)

# Invoked only by `atlan app deploy --ref <branch>` via workflow_dispatch.
# The push-to-main flow is handled by the existing `build-and-publish.yaml`
# in this repo — having both fire on push would double CI runs and risk
# concurrent marketplace publish race conditions.
on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to marketplace after build"
        type: boolean
        default: true
      ref:
        description: "Branch, tag, or SHA to build (default: current branch)"
        required: false
        type: string
      channel:
        description: "Target channel (ignored when tenants is set)"
        type: string
        default: "all"
      tenants:
        description: "Comma-separated tenant IDs for targeted publish"
        type: string
        default: ""

jobs:
  build-and-publish:
    uses: atlanhq/application-sdk/.github/workflows/build-and-publish-app.yaml@main
    with:
      ref: ${{ inputs.ref || github.ref }}
      publish: ${{ github.event.inputs.publish != 'false' }}
      channel: ${{ inputs.channel || 'all' }}
      tenants: ${{ inputs.tenants || '' }}
    secrets: inherit
