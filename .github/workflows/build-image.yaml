name: Publish App Docker Image

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!kurl-installer.yaml'
      - '!**.md'
      - '!images/**'
      - '!**.png'

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.get_branch.outputs.branch }}
      version: ${{ steps.get_version.outputs.version }}
      lowercase_branch: ${{ steps.get_lowercase_branch.outputs.lowercase_branch }}
      repository_name: ${{ steps.get_repo_name.outputs.repository_name }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Get branch name
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        id: get_branch

      - name: Get repository name
        run: echo "repository_name=`echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}' | sed -e "s/:refs//"`" >> $GITHUB_OUTPUT
        id: get_repo_name
        shell: bash

      - name: Get version tag
        run: echo "version=$(echo `git ls-remote https://${{ secrets.ORG_PAT_GITHUB }}@github.com/atlanhq/${{ steps.get_repo_name.outputs.repository_name }}.git ${{ steps.get_branch.outputs.branch }} | awk '{ print $1}' | cut -c1-7`)abcd" >> $GITHUB_OUTPUT
        id: get_version

      - name: Lowercase branch name
        run: echo "lowercase_branch=$(echo '${{ steps.get_branch.outputs.branch }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
        id: get_lowercase_branch

  push-to-ghcr:
    runs-on: ubuntu-latest
    needs: prepare
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-ghcr
      cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: $GITHUB_ACTOR
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build and push docker image to GHCR
        id: ghcr_docker_build
        uses: atlanhq/.github/.github/actions/secure-build-push-apps@main
        with:
          branch: ${{ github.ref_name }}
          snyk-token: ${{ secrets.SNYK_TOKEN_BU_APPS }}
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/atlanhq/${{ github.event.repository.name }}-${{ needs.prepare.outputs.lowercase_branch }}:latest
            ghcr.io/atlanhq/${{ github.event.repository.name }}-${{ needs.prepare.outputs.lowercase_branch }}:${{ needs.prepare.outputs.version }}
          build-args: |
            ACCESS_TOKEN_USR=$GITHUB_ACTOR
            ACCESS_TOKEN_PWD=${{ secrets.ORG_PAT_GITHUB }}
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
        env:
          DOCKER_CLIENT_TIMEOUT: 600
          COMPOSE_HTTP_TIMEOUT: 600

  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: prepare
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-dockerhub
      cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: atlanhq
          password: ${{ secrets.DOCKER_HUB_PAT_RW }}

      - name: Login to GitHub Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: $GITHUB_ACTOR
          password: ${{ secrets.ORG_PAT_GITHUB }}

      - name: Build and push docker image to Docker Hub
        id: docker_build
        uses: atlanhq/.github/.github/actions/secure-build-push-apps@main # Internal build push action to scan the images before pushing the same
        with:
          branch: ${{ github.ref_name }}
          snyk-token: ${{ secrets.SNYK_TOKEN_BU_APPS }}
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            registry-1.docker.io/atlanhq/${{ github.event.repository.name }}:${{ needs.prepare.outputs.branch }}-${{ needs.prepare.outputs.version }}
            registry-1.docker.io/atlanhq/${{ github.event.repository.name }}:${{ needs.prepare.outputs.branch }}-latest
        env:
          DOCKER_CLIENT_TIMEOUT: 600
          COMPOSE_HTTP_TIMEOUT: 600
