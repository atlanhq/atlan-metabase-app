name: Integration Tests

# Runs tests/integration/ with two modes selected by PR label:
#   `int-test` → fast mode (~5 min). API-surface/contract scenarios only.
#   `e2e-test` → full mode (~30 min). Also runs the 5 workflow-completion
#                scenarios that poll Temporal to COMPLETED and Pandera-validate
#                parquet output. Gated by E2E_RUN_WORKFLOW=1.
# Commit-status contexts `integration-tests` / `e2e-tests` are set per mode
# so existing branch-protection rules keep working without edits.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      mode:
        description: "Test mode"
        required: true
        type: choice
        options: [fast, full]
        default: fast

jobs:
  tests:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'int-test' ||
      github.event.label.name == 'e2e-test'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ (github.event.label.name == 'e2e-test' || github.event.inputs.mode == 'full') && 60 || 20 }}
    concurrency:
      group: integration-tests-${{ github.event.label.name || github.event.inputs.mode }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      contents: read
      statuses: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4.0.0
        with:
          persist-credentials: false

      - name: Set up Metabase test stack
        uses: ./.github/actions/metabase-test-stack

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.label.name }}" = "e2e-test" ]; then
            MODE="full"
          else
            MODE="fast"
          fi
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "Running in ${MODE} mode"

      - name: Run integration tests
        id: tests
        env:
          # Metabase basic auth — session-token via POST /api/session.
          # E2E_METABASE_HOST stores the URL WITH protocol (e.g. https://acme.metabaseapp.com)
          # because the v3 contract concatenates host + port without prepending a scheme.
          E2E_METABASE_HOST: ${{ secrets.E2E_METABASE_HOST }}
          E2E_METABASE_PORT: ${{ secrets.E2E_METABASE_PORT }}
          E2E_METABASE_USERNAME: ${{ secrets.E2E_METABASE_USERNAME }}
          E2E_METABASE_PASSWORD: ${{ secrets.E2E_METABASE_PASSWORD }}
          # Unlocks the 5 slow workflow-completion scenarios.
          E2E_RUN_WORKFLOW: ${{ steps.mode.outputs.mode == 'full' && '1' || '' }}
          ATLAN_LOCAL_DEVELOPMENT: "true"
          ATLAN_APPLICATION_NAME: metabase
        run: |
          mkdir -p results
          set +e
          uv run pytest tests/integration/ -v \
            --tb=short \
            --junit-xml=results/test-results.xml \
            2>&1 | tee results/test-output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          SUMMARY=$(grep -E "^(FAILED|ERROR|=)" results/test-output.txt | tail -1)
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $TEST_EXIT_CODE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-${{ steps.mode.outputs.mode }}-results
          path: results/
          retention-days: 14

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@b8f338c590a895d50bcbfa6c5859251edc8952fc # v2.8.2
        with:
          message-id: integration_tests_${{ steps.mode.outputs.mode }}_results
          message: |
            ## Integration Tests — ${{ steps.mode.outputs.mode == 'full' && 'Full (e2e)' || 'Fast (int)' }}

            **Status:** ${{ steps.tests.outcome == 'success' && 'Passed' || 'Failed' }}
            **Summary:** `${{ steps.tests.outputs.summary || 'No summary' }}`
            **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            <details>
            <summary>Re-run</summary>

            Remove and re-add the `${{ github.event.label.name || 'int-test' }}` label, or re-run from the Actions tab.
            </details>
        continue-on-error: true

      - name: Set commit status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const mode = '${{ steps.mode.outputs.mode }}';
            const state = '${{ steps.tests.outcome }}' === 'success' ? 'success' : 'failure';
            const ctx = mode === 'full' ? 'e2e-tests' : 'integration-tests';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: state === 'success' ? `${ctx} passed` : `${ctx} failed`,
              context: ctx,
            });
        continue-on-error: true

      - name: Summary
        if: always()
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          OUTCOME: ${{ steps.tests.outcome }}
        run: |
          uv run python3 - <<'PYEOF'
          import os, re, glob, xml.etree.ElementTree as ET
          from pathlib import Path

          mode    = os.environ.get("MODE", "fast")
          outcome = os.environ.get("OUTCOME", "unknown")
          icon    = "✅" if outcome == "success" else "❌"
          label   = "Full (e2e)" if mode == "full" else "Fast (int)"

          # ── parse JUnit XML ──────────────────────────────────────────────
          totals = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0, "time": 0.0}

          # Each scenario: (group, short_name, status_icon, duration_s, message)
          scenarios: list[tuple[str, str, str, float, str]] = []

          try:
              tree = ET.parse("results/test-results.xml")
              for suite in tree.getroot().iter("testsuite"):
                  totals["tests"]    += int(suite.get("tests",    0))
                  totals["failures"] += int(suite.get("failures", 0))
                  totals["errors"]   += int(suite.get("errors",   0))
                  totals["skipped"]  += int(suite.get("skipped",  0))
                  totals["time"]     += float(suite.get("time",   0))
              for tc in tree.getroot().iter("testcase"):
                  raw_name = tc.get("name", "")
                  t        = float(tc.get("time", 0))
                  # Strip the leading "test_" prefix pytest adds
                  short = raw_name.removeprefix("test_")
                  # Derive group from first segment (auth / preflight / workflow / metadata)
                  group = short.split("_")[0]
                  if tc.find("skipped") is not None:
                      status = "⏭"
                      msg = (tc.find("skipped").get("message") or "")[:80]
                  elif tc.find("failure") is not None:
                      status = "❌"
                      msg = (tc.find("failure").get("message") or "")[:80]
                  elif tc.find("error") is not None:
                      status = "💥"
                      msg = (tc.find("error").get("message") or "")[:80]
                  else:
                      status = "✅"
                      msg = ""
                  scenarios.append((group, short, status, t, msg))
          except Exception:
              pass

          passed = totals["tests"] - totals["failures"] - totals["errors"] - totals["skipped"]

          # ── fallback: last pytest summary line ───────────────────────────
          raw_summary = ""
          try:
              with open("results/test-output.txt") as f:
                  for line in f:
                      if re.match(r"^=+", line) and ("passed" in line or "failed" in line or "error" in line):
                          raw_summary = line.strip()
          except Exception:
              pass

          # ── record counts from parquet output ────────────────────────────
          # Each AE workflow run writes to a separate
          # ``<workflow_id>/<run_id>/raw/<entity>/*.parquet`` directory, so we
          # group counts by that run-dir and emit one row per run instead of a
          # single aggregate.
          # TODO(validation-suite): refine entity list once Metabase extraction
          # shape is finalised. Placeholder names match the v2 connector's
          # raw outputs (collection / dashboard / question / column).
          entities = ["collection", "dashboard", "question", "column"]
          run_counts: dict[str, dict[str, int]] = {}
          try:
              import pandas as pd
              base = Path("local/dapr/objectstore/artifacts/apps/metabase/workflows")
              if base.exists():
                  for raw_dir in sorted(base.rglob("raw")):
                      if not raw_dir.is_dir():
                          continue
                      counts = {}
                      for entity in entities:
                          files = list(raw_dir.glob(f"{entity}/*.parquet"))
                          if files:
                              counts[entity] = sum(len(pd.read_parquet(f)) for f in files)
                      if counts:
                          run_counts[str(raw_dir.parent.relative_to(base))] = counts
          except Exception:
              pass

          # ── write $GITHUB_STEP_SUMMARY ───────────────────────────────────
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_path, "w") as f:
              f.write(f"## {icon} Integration Tests — {label}\n\n")

              if totals["tests"]:
                  f.write("### Test results\n\n")
                  f.write("| Result | Count |\n|--------|-------|\n")
                  f.write(f"| ✅ Passed  | {passed} |\n")
                  f.write(f"| ❌ Failed  | {totals['failures'] + totals['errors']} |\n")
                  f.write(f"| ⏭ Skipped | {totals['skipped']} |\n")
                  f.write(f"| ⏱ Total time | {totals['time']:.1f}s |\n\n")

              if raw_summary:
                  f.write(f"```\n{raw_summary}\n```\n\n")

              if scenarios:
                  from itertools import groupby
                  f.write("### Scenario details\n\n")
                  # Group by the first word of the test name (auth/preflight/workflow/metadata)
                  for group, group_scenarios in groupby(scenarios, key=lambda s: s[0]):
                      rows = list(group_scenarios)
                      f.write(f"<details>\n<summary><b>{group.capitalize()}</b> "
                              f"({sum(1 for r in rows if r[2]=='✅')} passed, "
                              f"{sum(1 for r in rows if r[2] in ('❌','💥'))} failed, "
                              f"{sum(1 for r in rows if r[2]=='⏭')} skipped)</summary>\n\n")
                      f.write("| Status | Scenario | Time |\n|--------|----------|------|\n")
                      for _, short, status, t, msg in rows:
                          time_str = f"{t:.1f}s" if t >= 0.1 else "<0.1s"
                          note = f" — _{msg}_" if msg else ""
                          f.write(f"| {status} | `{short}`{note} | {time_str} |\n")
                      f.write("\n</details>\n\n")

              if run_counts:
                  f.write("### Extracted record counts (per workflow run)\n\n")
                  headers = ["Run"] + [e.capitalize() for e in entities] + ["Total"]
                  f.write("| " + " | ".join(headers) + " |\n")
                  f.write("|" + "|".join(["---"] * len(headers)) + "|\n")
                  totals = {e: 0 for e in entities}
                  for run, counts in run_counts.items():
                      row = [f"`{run}`"]
                      for e in entities:
                          row.append(f"{counts.get(e, 0):,}")
                          totals[e] += counts.get(e, 0)
                      row.append(f"**{sum(counts.values()):,}**")
                      f.write("| " + " | ".join(row) + " |\n")
                  if len(run_counts) > 1:
                      grand = sum(totals.values())
                      total_row = (
                          ["**Total**"]
                          + [f"**{totals[e]:,}**" for e in entities]
                          + [f"**{grand:,}**"]
                      )
                      f.write("| " + " | ".join(total_row) + " |\n")
                  f.write("\n")
          PYEOF

      - name: Cleanup
        if: always()
        run: |
          kill $(lsof -t -i :8000) 2>/dev/null || true
          uv run poe stop-deps || true
