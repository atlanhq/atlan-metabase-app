name: Stress Test

# TODO(validation-suite): stress test stub — Metabase needs a different
# scale model. The MSSQL gold-reference variant generates 10k tables via
# DDL on a shared SQL Server instance, then drops them. Metabase has no
# DDL surface, so the curation step here is a placeholder. A real
# implementation should mock or seed 10k cards/collections via the
# Metabase REST API (or recorded fixtures) before submitting the
# workflow. Until then this workflow only validates that the connector
# infrastructure starts and the app server is reachable.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  stress-test:
    # Trigger on either:
    #   - Manual dispatch from the Actions tab
    #   - Adding the `stress-test` label to a PR
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'stress-test'
    runs-on: ubuntu-latest
    # 240-minute ceiling inherited from MSSQL; tighten once Metabase scale
    # model is implemented.
    timeout-minutes: 240
    concurrency:
      group: stress-test-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      contents: read
      statuses: write

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout PR branch
        uses: actions/checkout@v4.0.0
        with:
          persist-credentials: false

      # ── Install Dapr CLI ──────────────────────────────────────────────
      - name: Install Dapr CLI
        run: |
          DAPR_VERSION="1.16.2"
          wget -q https://github.com/dapr/cli/releases/download/v${DAPR_VERSION}/dapr_linux_amd64.tar.gz -O /tmp/dapr.tar.gz
          tar -xzf /tmp/dapr.tar.gz -C /tmp
          sudo mv /tmp/dapr /usr/local/bin/
          chmod +x /usr/local/bin/dapr
          dapr init --runtime-version ${DAPR_VERSION} --slim

      # ── Install Temporal CLI ──────────────────────────────────────────
      - name: Install Temporal CLI
        run: curl -sSf https://temporal.download/cli.sh | sh

      # ── Add CLIs to PATH ──────────────────────────────────────────────
      - name: Add Dapr and Temporal to PATH
        run: |
          echo "$HOME/.dapr/bin" >> $GITHUB_PATH
          echo "$HOME/.temporalio/bin" >> $GITHUB_PATH

      # ── Python + uv + deps ────────────────────────────────────────────
      # NOTE: The gold reference (atlan-mssql-app) installs ODBC + FreeTDS
      # here. Metabase has no SQL driver dependency, so those steps are
      # intentionally omitted.
      - name: Setup Python, uv, and dependencies
        uses: atlanhq/application-sdk/.github/actions/setup-deps@main

      # ── Download Dapr components ──────────────────────────────────────
      - name: Download Dapr components
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run poe download-components

      # ── Start platform services ───────────────────────────────────────
      - name: Start Dapr + Temporal
        run: |
          uv run poe start-deps
          sleep 5

      # ── Start app server ──────────────────────────────────────────────
      - name: Start app server
        env:
          ATLAN_LOCAL_DEVELOPMENT: "true"
          ATLAN_APPLICATION_NAME: metabase
          ATLAN_HANDLER_MODULE: app.handler:MetabaseHandler
          DAPR_HTTP_PORT: "3500"
        run: |
          mkdir -p results
          uv run python main.py > results/app-server.log 2>&1 &
          echo "Waiting for app server on :8000..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/server/health > /dev/null 2>&1; then
              echo "App server ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::App server failed to start within 60s"
              exit 1
            fi
            sleep 1
          done

      # ── Run the stress test ───────────────────────────────────────────
      # TODO(validation-suite): replace placeholder with a real Metabase
      # scale model. Suggested approach: mock 10k cards/collections via
      # the Metabase REST API (e.g. POST /api/card, POST /api/collection)
      # before submitting a workflow, then assert workflow completes
      # within a target wall-clock. Until then this step succeeds if the
      # app server is healthy.
      - name: Run stress test
        id: stress
        env:
          E2E_METABASE_HOST: ${{ secrets.E2E_METABASE_HOST }}
          E2E_METABASE_PORT: ${{ secrets.E2E_METABASE_PORT }}
          E2E_METABASE_USERNAME: ${{ secrets.E2E_METABASE_USERNAME }}
          E2E_METABASE_PASSWORD: ${{ secrets.E2E_METABASE_PASSWORD }}
          ATLAN_LOCAL_DEVELOPMENT: "true"
          ATLAN_APPLICATION_NAME: metabase
        run: |
          mkdir -p results
          echo "[stress] Metabase stress test stub — no scale model implemented yet." | tee results/stress-output.txt
          echo "[stress] PASS (placeholder)" | tee -a results/stress-output.txt
          SUMMARY=$(grep -E "^\[stress\] (PASS|FAIL)" results/stress-output.txt | tail -1)
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "exit_code=0" >> "$GITHUB_OUTPUT"

      # ── Upload artifacts ──────────────────────────────────────────────
      - name: Upload stress results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results
          path: results/
          retention-days: 14

      # ── Post PR comment ───────────────────────────────────────────────
      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@b8f338c590a895d50bcbfa6c5859251edc8952fc # v2.8.2
        with:
          message-id: "stress_test_results"
          message: |
            ## Stress Test Results

            **Status:** ${{ steps.stress.outcome == 'success' && 'Passed' || 'Failed' }}
            **Summary:** `${{ steps.stress.outputs.summary || 'No summary available' }}`
            **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            <details>
            <summary>How to re-run</summary>

            Remove and re-add the `stress-test` label, or re-run from the Actions tab.
            </details>
        continue-on-error: true

      # ── Set commit status ────────────────────────────────────────────
      - name: Set commit status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = '${{ steps.stress.outcome }}' === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: state,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: state === 'success' ? 'Stress test passed' : 'Stress test failed',
              context: 'stress-test'
            });
        continue-on-error: true

      # ── Cleanup runner processes ──────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          kill $(lsof -t -i :8000) 2>/dev/null || true
          uv run poe stop-deps || true
