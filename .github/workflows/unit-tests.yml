name: Unit Tests

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: write
      id-token: write # Required for AWS credentials

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0 https://github.com/aws-actions/configure-aws-credentials/releases/tag/v6.1.0
        with:
          aws-region: ap-south-1
          role-to-assume: arn:aws:iam::733936409301:role/kryptonite-store_FullAccess

      - name: Get branch name
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT
        id: get_branch

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.7.3"

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run Tests with Coverage
        run: |
          uv run coverage run -m pytest tests/unit
          uv run coverage xml
          uv run coverage html
          uv run coverage report --fail-under=60

      - name: Comment Coverage Report on PR
        uses: orgoro/coverage@3f13a558c5af7376496aa4848bf0224aead366ac # v3.2 https://github.com/orgoro/coverage/releases/tag/v3.2
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Coverage Report to S3
        run: |
          aws s3 sync ./htmlcov s3://kryptonite-store/coverage/${{ github.event.repository.name }}/${{ steps.get_branch.outputs.branch }} --delete
