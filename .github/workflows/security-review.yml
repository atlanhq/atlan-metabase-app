name: Security Review
on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review manually'
        required: true
        type: number

concurrency:
  group: security-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  security-review:
    uses: atlanhq/mothership/.github/workflows/security-review-reusable.yml@beta
    with:
      globalprotect-portal-url: ${{ vars.REDACTED-VAR }}
      mothership-url: ${{ vars.REDACTED-VAR }}
    secrets: inherit
