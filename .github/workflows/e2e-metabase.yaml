name: e2e-metabase

# End-to-end test pipeline. Spins up three service containers:
#   - postgres   (Metabase's own metadata DB)
#   - metabase   (the BI tool we crawl, metabase/metabase:v0.61.2.3)
#   - mb-source  (postgres source — registered with Metabase to give us
#                 cross-connector lineage edges to validate)
#
# Then seeds Metabase to scale (≈ 1000 assets when E2E_SCALE=large),
# runs the connector against it, and asserts:
#   - preflight 4 named checks pass
#   - personal collections filtered out of fetch_metadata
#   - every extract @task returns the seeded entities
#   - include / exclude filter behaviour
#   - sqlglot ARS Process + ColumnProcess records
#   - scale invariants (≥ 50 collections, ≥ 800 questions, ≥ 150 dashboards)
#   - auth handler edge cases (success, bad creds, unreachable host)
#
# Triggered by:
#   - `e2e-metabase` PR label
#   - manual workflow_dispatch
#
# Image bump policy: see tests/e2e/README.md. Pin lives at the
# `metabase:` service `image:` line below and tests/e2e/conftest.py.

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      scale:
        description: "Seed scale (small ≈ 12 assets; large ≈ 1000)"
        type: choice
        options: [small, large]
        default: large

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Same-ref pushes queue rather than cancel — Metabase cold-start takes
  # ~60-90 s; killing a healthy in-progress run on a quick follow-up
  # commit just wastes the time we already spent.
  group: e2e-metabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'e2e-metabase')
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      # Metabase's own metadata DB. Postgres is the supported production
      # option; using H2 (the default) would leave artefacts in the
      # container fs and complicate teardown.
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: metabase
          POSTGRES_PASSWORD: metabase
          POSTGRES_DB: metabase_app_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U metabase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      # The Metabase server we crawl. Cold-start on a fresh postgres
      # backend typically takes 60-90 s; bumped --health-retries to 60
      # (10 min cap) so any one-off slow run doesn't get killed.
      metabase:
        image: metabase/metabase:v0.61.2.3
        env:
          MB_DB_TYPE: postgres
          MB_DB_HOST: postgres
          MB_DB_PORT: "5432"
          MB_DB_DBNAME: metabase_app_db
          MB_DB_USER: metabase
          MB_DB_PASS: metabase
          MB_CHECK_FOR_UPDATES: "false"
          MB_ANON_TRACKING_ENABLED: "false"
          # JVM hint — speeds up Metabase startup on the small runner.
          JAVA_OPTS: "-Xmx1500m"
        ports:
          - 3000:3000
        options: >-
          --health-cmd "curl -fsS http://localhost:3000/api/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 60
          --health-start-period 30s

      # Source postgres used as a Metabase data source. The seed script
      # registers this as a Metabase database, runs a sync, then creates
      # native-SQL questions referencing its tables — that gives us real
      # lineage edges to validate (sqlglot must resolve `source_db.public.<table>`
      # against the cached database_metadata).
      mb-source:
        image: postgres:15
        env:
          POSTGRES_USER: source
          POSTGRES_PASSWORD: source
          POSTGRES_DB: testdata
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U source"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MB_URL: http://localhost:3000
      MB_ADMIN_EMAIL: e2e@atlan.com
      MB_ADMIN_PASSWORD: AtlanMetabaseE2E!1
      MB_SOURCE_HOST: mb-source
      MB_SOURCE_PORT: "5432"
      MB_SOURCE_USER: source
      MB_SOURCE_PASSWORD: source
      MB_SOURCE_DB: testdata
      # Default to large scale (≈ 1000 assets) for the PR gate; manual
      # workflow_dispatch can override via the `scale` input.
      E2E_SCALE: ${{ inputs.scale || 'large' }}
      E2E_SEED_PARALLELISM: "10"
      E2E_METABASE_HOST: http://localhost
      E2E_METABASE_PORT: "3000"
      E2E_METABASE_USERNAME: e2e@atlan.com
      E2E_METABASE_PASSWORD: AtlanMetabaseE2E!1

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Seed source postgres
        run: |
          set -euo pipefail
          echo "::group::seed analytics + reports schemas"
          PGPASSWORD=$MB_SOURCE_PASSWORD psql -h localhost -p 5433 \
            -U "$MB_SOURCE_USER" -d "$MB_SOURCE_DB" \
            -f tests/e2e/fixtures/seed_source.sql
          echo "::endgroup::"
          # Spot-check that the schemas + tables landed.
          echo "::group::source schema inventory"
          PGPASSWORD=$MB_SOURCE_PASSWORD psql -h localhost -p 5433 \
            -U "$MB_SOURCE_USER" -d "$MB_SOURCE_DB" -c \
            "SELECT table_schema, COUNT(*) AS tables FROM information_schema.tables WHERE table_schema IN ('analytics','reports') GROUP BY table_schema ORDER BY table_schema;"
          echo "::endgroup::"

      # Belt-and-braces — the `services:` health check waits for the
      # HTTP port but Metabase serves /api/health only once its internal
      # migrations have completed. Poll until 'ok' or time out.
      - name: Wait for Metabase /api/health
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 600 ))
          attempts=0
          while [ $(date +%s) -lt $deadline ]; do
            attempts=$((attempts + 1))
            status=$(curl -sf "$MB_URL/api/health" 2>/dev/null | jq -r .status 2>/dev/null || echo "")
            if [ "$status" = "ok" ]; then
              echo "::notice::Metabase healthy after $attempts attempts ($(($(date +%s) - (deadline - 600))) s)"
              break
            fi
            echo "  attempt $attempts: status=$status — sleeping 5 s"
            sleep 5
          done
          [ "$status" = "ok" ] || { echo "::error::Metabase did not report healthy within 10 min" ; exit 1; }

      - name: Seed Metabase (admin + source DB + ${{ inputs.scale || 'large' }} scale)
        run: uv run python tests/e2e/seed_metabase.py

      - name: Run e2e tests
        run: |
          set -euo pipefail
          uv run pytest tests/e2e/ \
            -v -s -m e2e \
            --junitxml=e2e-report.xml \
            --tb=short \
            -o log_cli=true \
            -o log_cli_level=INFO

      - name: Summarise test results
        if: always()
        run: |
          if [ -f e2e-report.xml ]; then
            python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('e2e-report.xml').getroot()
          for s in root.iter('testsuite'):
              print(f'{s.attrib.get(\"name\",\"\"):40s}  '
                    f'tests={s.attrib.get(\"tests\",\"?\")} '
                    f'failures={s.attrib.get(\"failures\",\"?\")} '
                    f'errors={s.attrib.get(\"errors\",\"?\")} '
                    f'skipped={s.attrib.get(\"skipped\",\"?\")} '
                    f'time={s.attrib.get(\"time\",\"?\")}s')
          "
          fi

      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            e2e-report.xml
            tests/e2e/_artifacts/**
          if-no-files-found: ignore

      - name: Dump container logs on failure
        if: failure()
        run: |
          for c in $(docker ps -a --format '{{.Names}}'); do
            echo "::group::logs $c (last 300 lines)"
            docker logs --tail 300 "$c" 2>&1 || true
            echo "::endgroup::"
          done
