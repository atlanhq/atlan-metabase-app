name: e2e-metabase

# End-to-end test pipeline using the public `metabase/metabase` Docker
# image as a service container. Spins up:
#   - postgres (Metabase metadata DB)
#   - metabase (the BI tool we crawl)
#   - mb-source (postgres source for lineage testing)
# Seeds Metabase via REST API, runs the connector against it, and asserts
# entity counts, preflight checks, personal-collection filtering, and
# lineage edges (BIProcess + sqlglot-parsed Process + ColumnProcess).
#
# Triggered by:
#   - `e2e-metabase` PR label
#   - manual workflow_dispatch
#
# Metabase image bump policy: see tests/e2e/README.md. Pin lives at the
# `metabase:` service `image:` line below and the same tag in
# tests/e2e/conftest.py.

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: e2e-metabase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'e2e-metabase')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # Metabase's own metadata DB. Postgres is the supported production
      # option; using H2 (the default) would leave artefacts in the
      # container fs and complicate teardown.
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: metabase
          POSTGRES_PASSWORD: metabase
          POSTGRES_DB: metabase_app_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U metabase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      # The Metabase server we crawl.
      metabase:
        image: metabase/metabase:v0.61.2.3
        env:
          MB_DB_TYPE: postgres
          MB_DB_HOST: postgres
          MB_DB_PORT: "5432"
          MB_DB_DBNAME: metabase_app_db
          MB_DB_USER: metabase
          MB_DB_PASS: metabase
          # Disable Metabase phone-home checks during CI runs.
          MB_CHECK_FOR_UPDATES: "false"
          MB_ANON_TRACKING_ENABLED: "false"
        ports:
          - 3000:3000
        options: >-
          --health-cmd "curl -fsS http://localhost:3000/api/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

      # Source postgres used as a Metabase data source. The seed script
      # registers this as a Metabase database, runs a sync, then creates
      # native-SQL questions referencing its tables — that gives us real
      # lineage edges to validate (sqlglot must resolve `source_db.public.<table>`
      # against the cached database_metadata).
      mb-source:
        image: postgres:15
        env:
          POSTGRES_USER: source
          POSTGRES_PASSWORD: source
          POSTGRES_DB: testdata
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U source"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MB_URL: http://localhost:3000
      MB_ADMIN_EMAIL: e2e@example.com
      MB_ADMIN_PASSWORD: e2etestpw123
      MB_SOURCE_HOST: mb-source
      MB_SOURCE_PORT: "5432"
      MB_SOURCE_USER: source
      MB_SOURCE_PASSWORD: source
      MB_SOURCE_DB: testdata

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Seed source postgres
        run: |
          # Health-check is on the container — the runner reaches it via
          # localhost:5433. We don't need a uv-managed psql; the ubuntu
          # image ships it.
          PGPASSWORD=$MB_SOURCE_PASSWORD psql \
            -h localhost -p 5433 -U "$MB_SOURCE_USER" -d "$MB_SOURCE_DB" \
            -f tests/e2e/fixtures/seed_source.sql

      - name: Seed Metabase (admin + datasource + collections + questions + dashboards)
        run: uv run python tests/e2e/seed_metabase.py

      - name: Run e2e tests
        run: |
          uv run pytest tests/e2e/ \
            -v -m e2e \
            --junitxml=e2e-report.xml \
            --no-header

      - name: Upload e2e report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: |
            e2e-report.xml
            tests/e2e/_artifacts/**
          if-no-files-found: ignore

      - name: Dump metabase container logs on failure
        if: failure()
        run: |
          # The GHA `services:` block gives us containers but no direct
          # docker handle by name; use the runner's docker socket.
          for c in $(docker ps -a --format '{{.Names}}'); do
            echo "::group::logs $c"
            docker logs --tail 200 "$c" || true
            echo "::endgroup::"
          done
