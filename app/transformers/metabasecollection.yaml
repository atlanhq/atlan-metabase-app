table: MetabaseCollection
columns:
  typeName:
    source_query: "'MetabaseCollection'"
  status:
    source_query: "'ACTIVE'"
  attributes:
    name:
      source_query: name
    description:
      source_query: description
    qualifiedName:
      source_query: concat(connection_qualified_name, '/collections/', id)
      source_columns: [connection_qualified_name, id]
    sourceURL:
      source_query: sourceURL
    certificateStatus:
      source_query: certificate_status
    certificateStatusMessage:
      source_query: certificate_status_message
    metabaseSlug:
      source_query: slug
    metabaseColor:
      source_query: color
    metabaseNamespace:
      source_query: namespace
    metabaseIsPersonalCollection:
      source_query: metabase_is_personal_collection
    connectorName:
      source_query: connector_name
    connectionName:
      source_query: connection_name
    connectionQualifiedName:
      source_query: connection_qualified_name
    lastSyncRunAt:
      source_query: last_sync_run_at
    lastSyncWorkflowName:
      source_query: last_sync_workflow_name
    lastSyncRun:
      source_query: last_sync_run
    tenantId:
      source_query: tenant_id
