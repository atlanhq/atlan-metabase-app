table: MetabaseQuestion
columns:
  typeName:
    source_query: "'MetabaseQuestion'"
  status:
    source_query: "'ACTIVE'"
  attributes:
    name:
      source_query: name
    description:
      source_query: description
    qualifiedName:
      source_query: concat(connection_qualified_name, '/questions/', id)
      source_columns: [connection_qualified_name, id]
    sourceURL:
      source_query: sourceURL
    metabaseQueryType:
      source_query: query_type
    metabaseQuery:
      source_query: metabase_query
    metabaseCollectionName:
      source_query: collection_name
    metabaseCollectionQualifiedName:
      source_query: collection_qualified_name
    metabaseCollection:
      source_query: collection_relationship
    certificateStatus:
      source_query: certificate_status
    certificateStatusMessage:
      source_query: certificate_status_message
    sourceCreatedAt:
      source_query: source_created_at
    sourceUpdatedAt:
      source_query: source_updated_at
    sourceCreatedBy:
      source_query: source_created_by
    sourceUpdatedBy:
      source_query: source_updated_by
    metabaseDashboardCount:
      source_query: dashboard_count
    metabaseDashboards:
      source_query: metabase_dashboards
    connectorName:
      source_query: connector_name
    connectionName:
      source_query: connection_name
    connectionQualifiedName:
      source_query: connection_qualified_name
    lastSyncRunAt:
      source_query: last_sync_run_at
    lastSyncWorkflowName:
      source_query: last_sync_workflow_name
    lastSyncRun:
      source_query: last_sync_run
    tenantId:
      source_query: tenant_id
