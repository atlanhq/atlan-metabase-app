table: Process
columns:
  typeName:
    source_query: "'Process'"
  status:
    source_query: "'ACTIVE'"
  attributes:
    name:
      source_query: name
    qualifiedName:
      source_query: concat(connection_qualified_name, '/question_tables/', question_id)
      source_columns: [connection_qualified_name, question_id]
    sql:
      source_query: sql
    inputs:
      source_query: inputs
    outputs:
      source_query: outputs
    connectorName:
      source_query: connector_name
    connectionName:
      source_query: connection_name
    connectionQualifiedName:
      source_query: connection_qualified_name
    lastSyncRunAt:
      source_query: last_sync_run_at
    lastSyncWorkflowName:
      source_query: last_sync_workflow_name
    lastSyncRun:
      source_query: last_sync_run
    tenantId:
      source_query: tenant_id
